[project]
name = "picard-plugin-shelves"
version = "1.6.1"
readme = "README.md"
description = "A MusicBrainz Picard plugin to organize your music into shelves."
keywords = ["musicbrainz", "picard", "plugin", "shelves", "music", "organization"]
license-files = ["LISENCE"]
authors = [
    { name = "nrth3rnlb" }
]
requires-python = ">=3.10"
dependencies = [
    "black>=25.12.0",
    "mypy>=1.11",
    "picard>=2.13.3",
    "ruff>=0.14.10",
]

[project.optional-dependencies]
dev = [
    "black==25.12.0",
    "mypy>=1.11",
    "picard==2.13.3",
    "python-semantic-release>=7.23.3",
    "ruff>=0.14.10",
]
build = [
    "commitizen>=2.32.2",
    "pre-commit>=3.6",
]

#[tool.pydocstyle]
#convention = "numpy"

[tool.setuptools.packages.find]
include = ["shelves*"]
exclude = ["tests*"]

[tool.coverage.run]
source = ["shelves"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/ui_*.py",
    "*_ui.py"
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod"
]

[tool.mypy]
exclude = [
    "ui_.*\\.py$",
    ".*_ui\\.py$",
]
ignore_missing_imports = true
warn_unused_ignores = true
check_untyped_defs = true

[tool.ruff]
exclude = [
    "ui_*.py",
    "*_ui.py",
    "__pycache__",
    ".git",
    ".venv",
    "venv"
]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # Line too long


[tool.pdm.scripts]
precommit-install = "pre-commit install -t commit-msg"

[tool.commitizen]
name = "cz_conventional_commits"
version = "1.6.1"
tag_format = "v$version"
update_changelog_on_bump = true
gpg_sign = true
version_files = [
    "pyproject.toml:version",
    "shelves/__init__.py:PLUGIN_VERSION"
]
